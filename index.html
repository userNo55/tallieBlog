<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALLIE</title>
    
    <!-- ГЛОБАЛЬНЫЕ СТИЛИ (Навигация, Hero, Журнальный стиль) -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- СПЕЦИФИЧНЫЕ СТИЛИ ДЛЯ LAB -->
    <link rel="stylesheet" href="css/lab.css">
    
    <!-- СТИЛИ ДЛЯ COLLECTION -->
    <link rel="stylesheet" href="css/collection.css">
    
    <script src="js/main.js" defer></script>
</head>
<body>
    <nav>
        <div class="logo" data-nav="main">TALLIE; GOD</div>
        <ul class="nav-links">
            <li data-nav="main">About Tallie</li>
            <li data-nav="collection">Collection</li>
            <li data-nav="lab">Lab</li>
            <li data-nav="indulgentia">Indulgentia</li>
            <li data-nav="pray">Pray</li>
        </ul>
    </nav>

    <div id="app">
        <!-- HERO СЕКЦИЯ -->
        <section id="main-stage" class="active-section">
            
            <div class="hero-wrapper">
                <div class="hero-slogan">
                    <div class="line">
                        <span class="plain">Write</span>
                        <span class="hand">like crazy.</span>
                    </div>
                    <div class="line">
                        <span class="plain">Write</span>
                        <span class="hand">like me.</span>
                    </div>
                </div>
            </div>

            <!-- FAVORITES (В ряд сверху) -->
            <div class="section-block favorites-block">
                <div class="section-label">FAVORITES</div>
                <div class="sources-grid" id="sources-grid"></div>
            </div>

            <!-- SOURCES OF MAGIC (Журнальный стиль снизу) -->
            <div class="section-block sources-block">
                <div class="section-label">SOURCES OF MAGIC</div>
                <div class="magazine-grid" id="favorites-grid"></div>
            </div>

        </section>

        <!-- ОВЕРЛЕЙ -->
        <div id="content-stage">
            <div class="stage-header"></div>
            <div id="stage-body" class="stage-scroll"></div>
        </div>
    </div>

    <!-- КНОПКА ЗАКРЫТИЯ С НАЧАЛЬНЫМ КЛАССОМ СКРЫТИЯ -->
    <button class="back-btn hidden" id="back-btn">✕</button>
</body>
</html>
