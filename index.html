<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALLIE</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <nav>
        <!-- Логотип TALLIE; GOD с голубым свечением -->
        <div class="logo" data-nav="main">TALLIE; GOD</div>
        
        <ul class="nav-links">
            <li data-nav="main">About Tallie</li>
            <li data-nav="collection">Collection</li>
            <li data-nav="lab">Lab</li>
            <li data-nav="indulgentia">Indulgentia</li>
            <li data-nav="pray">Pray</li>
        </ul>
    </nav>

    <div id="app">
        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <section id="main-stage" class="active-section">
            <div class="hero-content">
                <div class="hero-slogan">
                    <div class="line">
                        <span class="plain">Write</span>
                        <span class="hand">like crazy.</span>
                    </div>
                    <div class="line">
                        <span class="plain">Write</span>
                        <span class="hand">like me.</span>
                    </div>
                </div>
            </div>

            <!-- КНОПКИ СНИЗУ -->
            <div class="bottom-links">
                <div class="sources-section">
                    <div class="section-label">SOURCES OF MAGIC</div>
                    <div class="grid-2x2" id="sources-grid"></div>
                </div>

                <div class="favorites-section">
                    <div class="section-label">FAVORITES</div>
                    <div class="grid-2x2" id="favorites-grid"></div>
                </div>
            </div>
        </section>

        <!-- ОВЕРЛЕЙ -->
        <div id="content-stage">
            <div class="stage-header">
                <button class="back-btn" id="back-btn" style="display:none;">← Close</button>
            </div>
            <div id="stage-body" class="stage-scroll"></div>
        </div>
    </div>
</body>
</html>
