<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALLIE</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <nav>
        <div class="logo" data-nav="main">T</div>
        <ul class="nav-links">
            <li data-nav="main">About Tallie</li>
            <li data-nav="collection">Collection</li>
            <li data-nav="lab">Lab</li>
            <li data-nav="indulgentia">Indulgentia</li>
            <li data-nav="pray">Pray</li>
        </ul>
    </nav>

    <div id="app">
        <section id="main-stage" class="active-section">
            
            <div class="hero-container">
                <!-- ЛЕВАЯ ЧАСТЬ: ТЕКСТ -->
                <div class="hero-left">
                    <!-- STORIES ARE (Белый, тонкий, капс) -->
                    <div class="hero-sub">— STORIES ARE</div>
                    
                    <!-- the real magic (Золотой, меловой) -->
                    <h1 class="hero-title">the <span>real</span> magic.</h1>
                    
                    <!-- Текст описания -->
                    <p class="hero-desc">I WRITE TO TRANSFORM ORDINARY MOMENTS INTO<br>SOMETHING LEGENDARY.</p>

                    <!-- ========================================== -->
                    <!-- СЛОГАН: Write (как Stories) + like crazy. (как magic) -->
                    <!-- ========================================== -->
                    <div class="hero-slogan">
                        <div class="slogan-line">
                            <span class="plain">Write</span> <span class="hand">like crazy.</span>
                        </div>
                        <div class="slogan-line">
                            <span class="plain">Write</span> <span class="hand">like me.</span>
                        </div>
                    </div>

                    <!-- Подпись TALLIE (Золотой, меловой) -->
                    <div class="hero-signature">TALLIE.</div>
                </div>

                <!-- ПРАВАЯ ЧАСТЬ: КАРТИНКА -->
                <div class="hero-right">
                    <div class="hero-image-box"></div>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- БЛОК КНОПОК SOURCES И FAVORITES -->
            <!-- ========================================== -->
            <div class="hero-sources-block">
                <div class="sources-wrapper">
                    <div class="source-column">
                        <div class="label">SOURCES OF MAGIC</div>
                        <div class="sources-grid-custom" id="sources-grid-custom"></div>
                    </div>
                    <div class="source-column">
                        <div class="label">FAVORITES</div>
                        <div class="sources-grid-custom" id="favorites-grid-custom"></div>
                    </div>
                </div>
            </div>

        </section>

        <!-- ОВЕРЛЕЙ (ДЛЯ ОСТАЛЬНЫХ СТРАНИЦ) -->
        <div id="content-stage">
            <div class="stage-header">
                <button class="back-btn" id="back-btn" style="display:none;">← Close</button>
            </div>
            <div id="stage-body" class="stage-scroll"></div>
        </div>
    </div>
</body>
</html>
