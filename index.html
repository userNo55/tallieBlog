<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALLIE</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <nav>
        <div class="logo" data-nav="main">T</div>
        <ul class="nav-links">
            <li data-nav="main">About Tallie</li>
            <li data-nav="collection">Collection</li>
            <li data-nav="lab">Lab</li>
            <li data-nav="indulgentia">Indulgentia</li>
            <li data-nav="pray">Pray</li>
        </ul>
    </nav>

    <div id="app">
        <!-- ТОЧНО ПО ТВОЕМУ СКРИНШОТУ -->
        <section id="main-stage" class="active-section">
            <div class="hero-wrapper">
                <div class="hero-content">
                    <!-- Только этот заголовок -->
                    <h1 class="hero-title">GOD;<span>TALLIE</span></h1>
                    
                    <!-- Только этот белый текст -->
                    <p class="hero-slogan">Write like crazy. Write like me.</p>
                </div>
            </div>

            <div class="bottom-links">
                <div class="sources-section">
                    <div class="section-label">SOURCES OF MAGIC</div>
                    <div class="grid-2x2">
                        <button class="box-btn">Playlist</button>
                        <button class="box-btn">Cinema</button>
                        <button class="box-btn">TV-shows</button>
                        <button class="box-btn">Places</button>
                    </div>
                </div>

                <div class="favorites-section">
                    <div class="section-label">FAVORITES</div>
                    <div class="grid-2x2">
                        <button class="box-btn">Food</button>
                        <button class="box-btn">Flower</button>
                        <button class="box-btn">Perfume</button>
                        <button class="box-btn">Time</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Оверлей для страниц (Collection, Lab и т.д.) -->
        <div id="content-stage">
            <div class="stage-header">
                <button class="back-btn" id="back-btn" style="display:none;">← Close</button>
            </div>
            <div id="stage-body" class="stage-scroll"></div>
        </div>
    </div>
</body>
</html>
